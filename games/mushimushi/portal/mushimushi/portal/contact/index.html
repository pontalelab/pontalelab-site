<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | Pontalelab</title>
  <meta name="description" content="Pontalelabへのお問い合わせはこちらから。">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="contact">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="../" class="logo" aria-label="Pontalelab トップページ">
        <ruby>Pontale<span class="logo-dot">lab</span><rt>ぽんたーれらぼ</rt></ruby>
      </a>
      <nav class="header-nav" aria-label="メインナビゲーション">
        <a href="../games/"   class="nav-link hide-sm" data-i18n="nav:games">ゲーム一覧</a>
        <a href="../about/"   class="nav-link hide-sm" data-i18n="nav:about">について</a>
        <a href="./"          class="nav-link hide-sm" data-i18n="nav:contact">お問い合わせ</a>
        <button class="lang-btn" aria-label="Switch language" data-i18n="lang:btn">English</button>
      </nav>
    </div>
  </header>

  <main>
    <!-- Page Hero -->
    <div class="page-hero">
      <h1 class="page-hero-title" data-i18n="contact:h1">お問い合わせ</h1>
      <p  class="page-hero-desc"  data-i18n="contact:lead">
        ご質問・ご意見・ご要望はこちらからどうぞ
      </p>
    </div>

    <!-- Contact Form -->
    <div class="simple-page">

      <form id="contact-form" class="contact-form" novalidate>

        <div class="form-group">
          <label for="cf-name" data-i18n="contact:label:name">お名前</label>
          <input type="text" id="cf-name" name="name"
                 autocomplete="name" required
                 placeholder="例）山田 太郎">
        </div>

        <div class="form-group">
          <label for="cf-email" data-i18n="contact:label:email">メールアドレス</label>
          <input type="email" id="cf-email" name="email"
                 autocomplete="email" required
                 placeholder="例）example@email.com">
        </div>

        <div class="form-group">
          <label for="cf-type" data-i18n="contact:label:type">お問い合わせ種別</label>
          <select id="cf-type" name="type">
            <option value="一般的なご質問" data-i18n-val="contact:type:general">一般的なご質問</option>
            <option value="不具合の報告"   data-i18n-val="contact:type:bug">不具合の報告</option>
            <option value="ご要望・アイデア" data-i18n-val="contact:type:request">ご要望・アイデア</option>
            <option value="その他"         data-i18n-val="contact:type:other">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cf-message" data-i18n="contact:label:msg">内容</label>
          <textarea id="cf-message" name="message" required
                    placeholder="お問い合わせ内容をご記入ください"></textarea>
        </div>

        <p class="form-note" data-i18n="contact:note">
          送信後、お使いのメールアプリが開きます。
        </p>

        <button type="submit" class="btn btn-primary" data-i18n="contact:submit">
          メールで送信する
        </button>

      </form>

      <p style="margin-top:32px;color:var(--text-mid);font-size:0.95rem;">
        <span data-i18n="contact:alt">または直接メールでご連絡ください：</span><br>
        <a href="mailto:pontalelab@gmail.com"
           style="color:var(--forest-dk);text-decoration:underline;font-weight:700;">
          pontalelab@gmail.com
        </a>
      </p>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-top">
        <div class="footer-brand">
          <div class="footer-logo">Pontalelab</div>
          <p class="footer-tagline" data-i18n="footer:tagline">親子で楽しむ、発見の研究所</p>
        </div>
        <nav class="footer-nav" aria-label="フッターナビゲーション">
          <a href="../games/"   data-i18n="footer:games">ゲーム一覧</a>
          <a href="../about/"   data-i18n="footer:about">Pontalelabについて</a>
          <a href="../privacy/" data-i18n="footer:privacy">プライバシーポリシー</a>
          <a href="./"          data-i18n="footer:contact">お問い合わせ</a>
        </nav>
      </div>
      <div class="footer-bottom">
        <p class="footer-email">
          <a href="mailto:pontalelab@gmail.com">pontalelab@gmail.com</a>
        </p>
        <p class="footer-copy" data-i18n="footer:copy">© 2025 Pontalelab</p>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
